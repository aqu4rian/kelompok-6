<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Kelompok</title>

    <style>
        :root {
            --primary-green: #2d6a4f;
            --secondary-orange: #f8961e;
            --bg-light: #f8f9fa;
            --white: #ffffff;
            --text-dark: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-light);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: auto;
            background: var(--white);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
        }

        h1 {
            color: var(--primary-green);
            margin-bottom: 10px;
        }

        p {
            color: #666;
        }

        .member-list {
            margin-top: 30px;
            text-align: left;
        }

        .member {
            background: #f4f6f4;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            border-left: 5px solid var(--secondary-orange);
            font-weight: bold;
        }

        .nav-button {
            display: inline-block;
            margin-top: 25px;
            padding: 12px 20px;
            background-color: var(--primary-green);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: 0.3s;
        }

        .nav-button:hover {
            background-color: #1b4332;
        }

    </style>
</head>
<body>

<div class="container">

</html>
